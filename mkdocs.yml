site_name: AToM-OpenMM
repo_url: https://github.com/Gallicchio-Lab/AToM-OpenMM
repo_name: Gallicchio-Lab/AToM-OpenMM

theme:
  name: material
  palette:
    primary: white
  logo: assets/images/atom-logo.png
  favicon: assets/images/atom-logo.png
  features:
    - navigation.sections
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

nav:
  - Home: index.md
  - Installation: installation.md
  - Tutorials: tutorials/index.md
  - User Guide:
      - Overview: user-guide/index.md
      - Configuration Files: user-guide/configuration.md
      - Absolute Binding Free Energy: user-guide/abfe.md
      - Relative Binding Free Energy: user-guide/rbfe.md
  - Theory: theory/index.md
  - API Reference: api-reference/index.md
  - Troubleshooting: troubleshooting.md
  - Contributing: contributing.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
